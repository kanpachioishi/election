<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">わたしの選挙 ロゴマーク案 soft thin</title>
  <desc id="desc">やさしいメダルの中央に細めの票の文字を置いたロゴマーク</desc>
  <defs>
    <radialGradient id="softFace" cx="34%" cy="30%" r="78%">
      <stop offset="0%" stop-color="#fff4d1" />
      <stop offset="42%" stop-color="#ffe3a0" />
      <stop offset="100%" stop-color="#f3c25d" />
    </radialGradient>
    <linearGradient id="softRing" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffeab6" />
      <stop offset="100%" stop-color="#d9a447" />
    </linearGradient>
    <linearGradient id="softCore" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8de" />
      <stop offset="100%" stop-color="#ffd57a" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#081118" flood-opacity="0.16" />
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <circle cx="48" cy="48" r="34" fill="url(#softRing)" />
    <circle cx="48" cy="48" r="28.5" fill="url(#softFace)" stroke="#fff1c8" stroke-width="1.5" />
    <circle cx="48" cy="48" r="20.5" fill="url(#softCore)" opacity="0.95" />
    <path d="M27 36.5c3.8-8.8 11.7-14.1 21-14.1 8.8 0 16.4 4.7 20.4 12.2-4.2-4.1-10.2-6.6-17.2-6.6-9.2 0-17.1 3.5-24.2 8.5z" fill="#fff8e1" opacity="0.72" />
    <circle cx="35.5" cy="34" r="3.2" fill="#fff6dc" opacity="0.7" />
    <text x="48" y="60" text-anchor="middle" font-family="Yu Mincho, Hiragino Mincho ProN, serif" font-size="36" font-weight="700" fill="#2b1b08">票</text>
  </g>
</svg>
