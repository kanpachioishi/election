<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全国の選挙スケジュール一覧 - わたしの選挙</title>
  <meta name="description" content="全国の選挙スケジュールを一覧でチェック。国政選挙、都道府県選挙、市区町村選挙をまとめて確認できます。">
  <meta property="og:title" content="全国の選挙スケジュール一覧 - わたしの選挙">
  <meta property="og:description" content="全国の選挙スケジュールを一覧でチェック。国政・地方選挙をまとめて確認。">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0b1219">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="canonical" href="https://senkyoannai.com/pages/schedule.html">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="icon" href="../icons/app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../icons/app-icon.svg">
  <link rel="stylesheet" href="../common/style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="site-logo">
        <span class="logo-icon">&#x1F5F3;</span>
        わたしの選挙
      </a>
      <button class="menu-toggle" aria-label="メニュー" onclick="document.querySelector('.nav-list').classList.toggle('open')">&#9776;</button>
      <nav>
        <ul class="nav-list">
          <li><a href="../index.html">トップ</a></li>
          <li><a href="schedule.html" class="active">選挙スケジュール</a></li>
          <li><a href="turnout.html">投票率データ</a></li>
          <li><a href="verification-policy.html">情報の確認基準</a></li>
          <li><a href="about.html">このサイトについて</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <h1 class="page-title">全国の選挙スケジュール</h1>
    <p class="page-subtitle">国政選挙から地方選挙まで、今後の選挙予定を一覧で確認できます。</p>
    <p class="page-note" id="dataNote">
      <strong>データの扱い:</strong>
      `data/v1` の canonical data から生成した公開データを表示しています。投票日が今日以降の選挙だけを掲載し、各選挙の出典リンクを確認元として表示します。
    </p>

    <!-- フィルター -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="national">国政選挙</button>
      <button class="filter-btn" data-filter="prefectural">都道府県</button>
      <button class="filter-btn" data-filter="municipal">市区町村</button>
      <button class="filter-btn" data-filter="by_election">補欠・再選挙</button>
    </div>

    <!-- スケジュールリスト -->
    <div class="schedule-list" id="scheduleList"></div>
  </main>

  <!-- フッター -->
  <footer class="site-footer">
    <p class="footer-message">確認した一次情報をもとに、選挙や議会ごとの公式ページへの導線を整理しています。</p>
    <div class="footer-links">
      <a href="about.html">このサイトについて</a>
      <a href="verification-policy.html">情報の確認基準</a>
      <a href="privacy.html">プライバシーと通知</a>
      <a href="contact.html">お問い合わせ</a>
    </div>
  </footer>

  <script src="../data/site-data.js"></script>
  <script>
    const scheduleList = document.getElementById('scheduleList');
    const filterBar = document.getElementById('filterBar');
    const dataNote = document.getElementById('dataNote');
    let currentFilter = 'all';
    const DATA = window.ELECTION_SITE_DATA;
    const TYPE_LABELS = {
      national: '国政選挙',
      prefectural: '都道府県',
      municipal: '市区町村',
      by_election: '補欠・再選挙',
    };

    filterBar.addEventListener('click', function(e) {
      if (!e.target.classList.contains('filter-btn')) return;
      filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentFilter = e.target.dataset.filter;
      renderSchedule();
    });

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function parseDate(dateText) {
      const [year, month, day] = String(dateText).split('-').map(Number);
      return new Date(year, month - 1, day);
    }

    function todayStart() {
      const date = new Date();
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function isAbsoluteHttpUrl(value) {
      try {
        const url = new URL(value);
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch {
        return false;
      }
    }

    function formatGeneratedAt(dateText) {
      if (!dateText) return '';
      const date = new Date(dateText);
      if (Number.isNaN(date.getTime())) return '';
      const parts = new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: 'numeric',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).formatToParts(date);
      const values = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return `${values.year}年${values.month}月${values.day}日 ${values.hour}:${values.minute}`;
    }

    function renderSchedule() {
      if (!DATA?.elections) {
        scheduleList.innerHTML = '<div class="error-message">公開データを読み込めませんでした。</div>';
        return;
      }

      const now = todayStart();

      const filtered = DATA.elections
        .map(e => {
          const dateObj = parseDate(e.voteDate);
          const daysLeft = Math.ceil((dateObj - now) / (1000 * 60 * 60 * 24));
          return { ...e, dateObj, daysLeft };
        })
        .filter(e => e.voteDate && e.daysLeft >= 0)
        .filter(e => currentFilter === 'all' || e.type === currentFilter)
        .sort((a, b) => a.dateObj - b.dateObj);

      if (filtered.length === 0) {
        scheduleList.innerHTML = '<div class="no-results">該当する選挙予定はありません。</div>';
        return;
      }

      scheduleList.innerHTML = filtered.map(e => {
        const d = e.dateObj;
        const year = d.getFullYear();
        const month = d.getMonth() + 1;
        const day = d.getDate();
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        const dayName = days[d.getDay()];
        const typeLabel = TYPE_LABELS[e.type] ?? e.type;
        const regionLabel = e.scopeType === 'all' ? '全国' : (e.primaryRegionShortName || e.primaryRegionName || e.prefectureName || '地域未設定');

        let countdownText;
        if (e.daysLeft < 0) {
          countdownText = '<span style="color:var(--color-text-muted)">終了</span>';
        } else if (e.daysLeft === 0) {
          countdownText = '<span style="color:var(--color-accent); font-weight:700">本日！</span>';
        } else if (e.daysLeft <= 30) {
          countdownText = `<span style="color:var(--color-accent); font-weight:700">あと${e.daysLeft}日</span>`;
        } else {
          countdownText = `<span style="color:var(--color-text-muted)">あと${e.daysLeft}日</span>`;
        }

        const sourceLink = isAbsoluteHttpUrl(e.sourceUrl)
          ? `<a class="source-link" href="${escapeHtml(e.sourceUrl)}" target="_blank" rel="noopener noreferrer">確認元</a>`
          : '';

        return `
          <div class="schedule-item">
            <div class="schedule-date-box">
              <div class="year">${year}</div>
              <div class="month">${month}月</div>
              <div class="day">${day}</div>
            </div>
            <div class="schedule-info">
              <h3>${escapeHtml(e.name)}</h3>
              <div class="schedule-meta">
                <span class="card-type ${escapeHtml(e.type)}" style="font-size:0.7rem; vertical-align:middle;">${escapeHtml(typeLabel)}</span>
                &nbsp; ${escapeHtml(regionLabel)} &nbsp; ${year}年${month}月${day}日（${dayName}） &nbsp; ${countdownText}
              </div>
              <p class="schedule-desc">${escapeHtml(e.description || '公式情報を確認中です。')}</p>
              ${sourceLink ? `<div class="schedule-actions">${sourceLink}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderDataNote() {
      const generated = formatGeneratedAt(DATA?.sourceGeneratedAt);
      if (!generated) return;
      dataNote.innerHTML = `
        <strong>データの扱い:</strong>
        <code>data/v1</code> の canonical data から生成した公開データを表示しています。
        投票日が今日以降の選挙だけを掲載し、各選挙の出典リンクを確認元として表示します。
        データ基準: ${escapeHtml(generated)}
      `;
    }

    renderDataNote();
    renderSchedule();
  </script>
  <script src="../assets/pwa.js"></script>

</body>
</html>
